<svg width="880" height="188" viewBox="0 0 880 188" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .pill rect { fill: none; stroke: #27272a; }
    .pill text { fill: #fafafa; font-size: 12.5px; }
    .pill {
      opacity: 0;
      animation: rise 0.45s ease-out forwards;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>

  <!-- card -->
  <rect x="0.5" y="0.5" width="879" height="187" rx="12" fill="#09090b" stroke="#27272a"/>

  <text x="24" y="34" class="sans" font-size="14" font-weight="600" fill="#fafafa">Stack</text>
  <text x="856" y="34" text-anchor="end" class="sans" font-size="12" fill="#71717a">tools I reach for daily</text>

  <!-- row 1 -->
  <g class="pill sans" style="animation-delay:.10s" transform="translate(24,56)"><rect x="0.5" y="0.5" width="46" height="29" rx="8"/><text x="23.5" y="19.5" text-anchor="middle">PHP</text></g>
  <g class="pill sans" style="animation-delay:.15s" transform="translate(79,56)"><rect x="0.5" y="0.5" width="95" height="29" rx="8"/><text x="48" y="19.5" text-anchor="middle">TypeScript</text></g>
  <g class="pill sans" style="animation-delay:.20s" transform="translate(183,56)"><rect x="0.5" y="0.5" width="95" height="29" rx="8"/><text x="48" y="19.5" text-anchor="middle">JavaScript</text></g>
  <g class="pill sans" style="animation-delay:.25s" transform="translate(287,56)"><rect x="0.5" y="0.5" width="60" height="29" rx="8"/><text x="30.5" y="19.5" text-anchor="middle">React</text></g>
  <g class="pill sans" style="animation-delay:.30s" transform="translate(356,56)"><rect x="0.5" y="0.5" width="74" height="29" rx="8"/><text x="37.5" y="19.5" text-anchor="middle">Next.js</text></g>
  <g class="pill sans" style="animation-delay:.35s" transform="translate(439,56)"><rect x="0.5" y="0.5" width="74" height="29" rx="8"/><text x="37.5" y="19.5" text-anchor="middle">Node.js</text></g>
  <g class="pill sans" style="animation-delay:.40s" transform="translate(522,56)"><rect x="0.5" y="0.5" width="109" height="29" rx="8"/><text x="55" y="19.5" text-anchor="middle">Tailwind CSS</text></g>

  <!-- row 2 -->
  <g class="pill sans" style="animation-delay:.45s" transform="translate(24,94)"><rect x="0.5" y="0.5" width="88" height="29" rx="8"/><text x="44.5" y="19.5" text-anchor="middle">WordPress</text></g>
  <g class="pill sans" style="animation-delay:.50s" transform="translate(121,94)"><rect x="0.5" y="0.5" width="88" height="29" rx="8"/><text x="44.5" y="19.5" text-anchor="middle">Gutenberg</text></g>
  <g class="pill sans" style="animation-delay:.55s" transform="translate(218,94)"><rect x="0.5" y="0.5" width="60" height="29" rx="8"/><text x="30.5" y="19.5" text-anchor="middle">MySQL</text></g>
  <g class="pill sans" style="animation-delay:.60s" transform="translate(287,94)"><rect x="0.5" y="0.5" width="95" height="29" rx="8"/><text x="48" y="19.5" text-anchor="middle">PostgreSQL</text></g>
  <g class="pill sans" style="animation-delay:.65s" transform="translate(391,94)"><rect x="0.5" y="0.5" width="67" height="29" rx="8"/><text x="34" y="19.5" text-anchor="middle">Docker</text></g>
  <g class="pill sans" style="animation-delay:.70s" transform="translate(467,94)"><rect x="0.5" y="0.5" width="123" height="29" rx="8"/><text x="62" y="19.5" text-anchor="middle">GitHub Actions</text></g>

  <!-- row 3 -->
  <g class="pill sans" style="animation-delay:.75s" transform="translate(24,132)"><rect x="0.5" y="0.5" width="88" height="29" rx="8"/><text x="44.5" y="19.5" text-anchor="middle">Terraform</text></g>
  <g class="pill sans" style="animation-delay:.80s" transform="translate(121,132)"><rect x="0.5" y="0.5" width="109" height="29" rx="8"/><text x="55" y="19.5" text-anchor="middle">Google Cloud</text></g>
  <g class="pill sans" style="animation-delay:.85s" transform="translate(239,132)"><rect x="0.5" y="0.5" width="46" height="29" rx="8"/><text x="23.5" y="19.5" text-anchor="middle">Git</text></g>
  <g class="pill sans" style="animation-delay:.90s" transform="translate(294,132)"><rect x="0.5" y="0.5" width="60" height="29" rx="8"/><text x="30.5" y="19.5" text-anchor="middle">Figma</text></g>
