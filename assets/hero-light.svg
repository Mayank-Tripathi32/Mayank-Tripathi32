<svg width="880" height="250" viewBox="0 0 880 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }
    .fg    { fill: #09090b; }
    .muted { fill: #71717a; }
    .faint { fill: #a1a1aa; }

    /* Progressive enhancement: everything is visible by default; `backwards`
       fill hides it only while its animation is waiting to start. Renderers
       without CSS animation support show the finished card. */
    .ch { animation: charIn 1ms steps(1, end) backwards; }
    @keyframes charIn { from { opacity: 0; } }
    .t1 { animation-delay: 0.40s; }
    .t2 { animation-delay: 0.55s; }
    .t3 { animation-delay: 0.70s; }
    .t4 { animation-delay: 0.85s; }
    .t5 { animation-delay: 1.00s; }
    .t6 { animation-delay: 1.15s; }

    .reveal { animation: reveal 0.5s ease-out backwards; }
    .d1 { animation-delay: 1.5s; }
    .d2 { animation-delay: 1.8s; }
    .d3 { animation-delay: 2.1s; }
    .d4 { animation-delay: 2.4s; }
    @keyframes reveal {
      from { opacity: 0; transform: translateY(5px); }
    }

    .cursor { animation: blink 1.1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>

  <!-- card -->
  <rect x="0.5" y="0.5" width="879" height="249" rx="12" fill="#ffffff" stroke="#e4e4e7"/>

  <!-- window dots -->
  <circle cx="26" cy="26" r="5" fill="#e4e4e7"/>
  <circle cx="46" cy="26" r="5" fill="#e4e4e7"/>
  <circle cx="66" cy="26" r="5" fill="#e4e4e7"/>
  <text x="440" y="30" text-anchor="middle" class="mono faint" font-size="12">mayank@rtcamp — ~/open-web</text>
  <line x1="1" y1="48" x2="879" y2="48" stroke="#e4e4e7"/>

  <!-- $ whoami (typed character by character) -->
  <text x="28" y="86" class="mono muted" font-size="14">$</text>
  <text x="44" y="86" class="mono fg ch t1" font-size="14">w</text>
  <text x="52.4" y="86" class="mono fg ch t2" font-size="14">h</text>
  <text x="60.8" y="86" class="mono fg ch t3" font-size="14">o</text>
  <text x="69.2" y="86" class="mono fg ch t4" font-size="14">a</text>
  <text x="77.6" y="86" class="mono fg ch t5" font-size="14">m</text>
  <text x="86" y="86" class="mono fg ch t6" font-size="14">i</text>

  <!-- output -->
  <g class="reveal d1">
    <text x="28" y="126" class="sans fg" font-size="26" font-weight="600">Mayank Tripathi</text>
  </g>
  <g class="reveal d2">
    <text x="28" y="156" class="sans muted" font-size="14">Software Engineer @ rtCamp — full-stack, with a soft spot for the block editor</text>
  </g>
  <g class="reveal d3">
    <text x="28" y="180" class="sans muted" font-size="14">WordPress Core Contributor · shipped in WP 6.7 → 7.0 · writes at leaveitblank.co</text>
  </g>

  <!-- next prompt -->
  <g class="reveal d4">
    <text x="28" y="218" class="mono muted" font-size="14">$</text>
    <rect class="cursor" x="44" y="205" width="8" height="17" fill="#09090b"/>
  </g>
</svg>
