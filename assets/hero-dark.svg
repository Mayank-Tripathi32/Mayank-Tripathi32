<svg width="880" height="250" viewBox="0 0 880 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }
    .fg    { fill: #fafafa; }
    .muted { fill: #a1a1aa; }
    .faint { fill: #71717a; }

    /* Loop-only animations: every element is fully visible at t=0, so static
       SVG renderers (GitHub mobile app, thumbnailers) show the complete card. */
    .cursor { animation: blink 1.1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .dot  { animation: pulse 2.4s ease-in-out infinite; }
    @keyframes pulse { 50% { opacity: 0.35; } }
  </style>

  <!-- card -->
  <rect x="0.5" y="0.5" width="879" height="249" rx="12" fill="#09090b" stroke="#27272a"/>

  <!-- window chrome -->
  <circle cx="26" cy="26" r="5" fill="#27272a"/>
  <circle cx="46" cy="26" r="5" fill="#27272a"/>
  <circle cx="66" cy="26" r="5" fill="#27272a"/>
  <text x="440" y="30" text-anchor="middle" class="mono faint" font-size="12">mayank@rtcamp — ~/open-web</text>
  <line x1="1" y1="48" x2="879" y2="48" stroke="#27272a"/>

  <!-- $ whoami -->
  <text x="28" y="86" class="mono" font-size="14"><tspan class="muted">$</tspan><tspan class="fg" dx="8">whoami</tspan></text>

  <!-- output -->
  <text x="28" y="126" class="sans fg" font-size="26" font-weight="600">Mayank Tripathi</text>
  <text x="28" y="156" class="sans muted" font-size="14">Software Engineer @ rtCamp — full-stack, with a soft spot for the block editor</text>
  <text x="28" y="180" class="sans muted" font-size="14">WordPress Core Contributor · shipped in WP 6.7 → 7.0 · writes at leaveitblank.co</text>

  <!-- next prompt, blinking -->
  <text x="28" y="218" class="mono muted" font-size="14">$</text>
  <rect class="cursor" x="44" y="205" width="8" height="17" fill="#fafafa"/>

  <!-- status -->
  <circle class="dot" cx="668" cy="213" r="4" fill="#10b981"/>
  <text x="680" y="217.5" class="sans faint" font-size="12.5">open to interesting problems</text>
</svg>
