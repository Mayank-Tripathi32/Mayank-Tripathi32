<svg width="880" height="188" viewBox="0 0 880 188" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .pill rect { fill: none; stroke: #e4e4e7; }
    .pill text { fill: #09090b; font-size: 12.5px; }
    /* No entrance animation: static SVG renderers (GitHub mobile app,
       thumbnailers) snapshot at t=0, so pills must be visible from the start. */
  </style>

  <!-- card -->
  <rect x="0.5" y="0.5" width="879" height="187" rx="12" fill="#ffffff" stroke="#e4e4e7"/>

  <text x="24" y="34" class="sans" font-size="14" font-weight="600" fill="#09090b">Stack</text>
  <text x="856" y="34" text-anchor="end" class="sans" font-size="12" fill="#a1a1aa">tools I reach for daily</text>

  <!-- row 1 -->
  <g class="pill sans" transform="translate(24,56)"><rect x="0.5" y="0.5" width="46" height="29" rx="8"/><text x="23.5" y="19.5" text-anchor="middle">PHP</text></g>
  <g class="pill sans" transform="translate(79,56)"><rect x="0.5" y="0.5" width="95" height="29" rx="8"/><text x="48" y="19.5" text-anchor="middle">TypeScript</text></g>
  <g class="pill sans" transform="translate(183,56)"><rect x="0.5" y="0.5" width="95" height="29" rx="8"/><text x="48" y="19.5" text-anchor="middle">JavaScript</text></g>
  <g class="pill sans" transform="translate(287,56)"><rect x="0.5" y="0.5" width="60" height="29" rx="8"/><text x="30.5" y="19.5" text-anchor="middle">React</text></g>
  <g class="pill sans" transform="translate(356,56)"><rect x="0.5" y="0.5" width="74" height="29" rx="8"/><text x="37.5" y="19.5" text-anchor="middle">Next.js</text></g>
  <g class="pill sans" transform="translate(439,56)"><rect x="0.5" y="0.5" width="74" height="29" rx="8"/><text x="37.5" y="19.5" text-anchor="middle">Node.js</text></g>
  <g class="pill sans" transform="translate(522,56)"><rect x="0.5" y="0.5" width="109" height="29" rx="8"/><text x="55" y="19.5" text-anchor="middle">Tailwind CSS</text></g>

  <!-- row 2 -->
  <g class="pill sans" transform="translate(24,94)"><rect x="0.5" y="0.5" width="88" height="29" rx="8"/><text x="44.5" y="19.5" text-anchor="middle">WordPress</text></g>
  <g class="pill sans" transform="translate(121,94)"><rect x="0.5" y="0.5" width="88" height="29" rx="8"/><text x="44.5" y="19.5" text-anchor="middle">Gutenberg</text></g>
  <g class="pill sans" transform="translate(218,94)"><rect x="0.5" y="0.5" width="60" height="29" rx="8"/><text x="30.5" y="19.5" text-anchor="middle">MySQL</text></g>
  <g class="pill sans" transform="translate(287,94)"><rect x="0.5" y="0.5" width="95" height="29" rx="8"/><text x="48" y="19.5" text-anchor="middle">PostgreSQL</text></g>
  <g class="pill sans" transform="translate(391,94)"><rect x="0.5" y="0.5" width="67" height="29" rx="8"/><text x="34" y="19.5" text-anchor="middle">Docker</text></g>
  <g class="pill sans" transform="translate(467,94)"><rect x="0.5" y="0.5" width="123" height="29" rx="8"/><text x="62" y="19.5" text-anchor="middle">GitHub Actions</text></g>

  <!-- row 3 -->
  <g class="pill sans" transform="translate(24,132)"><rect x="0.5" y="0.5" width="88" height="29" rx="8"/><text x="44.5" y="19.5" text-anchor="middle">Terraform</text></g>
  <g class="pill sans" transform="translate(121,132)"><rect x="0.5" y="0.5" width="109" height="29" rx="8"/><text x="55" y="19.5" text-anchor="middle">Google Cloud</text></g>
  <g class="pill sans" transform="translate(239,132)"><rect x="0.5" y="0.5" width="46" height="29" rx="8"/><text x="23.5" y="19.5" text-anchor="middle">Git</text></g>
  <g class="pill sans" transform="translate(294,132)"><rect x="0.5" y="0.5" width="60" height="29" rx="8"/><text x="30.5" y="19.5" text-anchor="middle">Figma</text></g>
